<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradewise Creations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <header>
            <img src="signal-2023-11-06-084620_002.png" class="logo-taureau" alt="TWC">
        </header>

        <section class="trust-section">
            <img src="ninjatrader.png" class="partner-logo" alt="Ninjatrader">

            <div class="trust-item">
                <img src="star.png" class="trust-icon" alt="">
                <div class="trust-title">100%<br>FREE TRIALS</div>
                <div class="trust-text">We don't need your<br>credit card</div>
            </div>

            <div class="trust-item">
                <img src="return.png" class="trust-icon" alt="">
                <div class="trust-title">7 DAY MONEY-BACK<br>GUARANTEE</div>
                <div class="trust-text">Our product is not<br>what you expected</div>
            </div>

            <div class="trust-item">
                <img src="user.png" class="trust-icon" alt="">
                <div class="trust-title">ROUND-THE-CLOCK<br>CUSTOMER SERVICE</div>
                <div class="trust-text">We are here for<br>you all the way</div>
            </div>

            <img src="kinetick.png" class="partner-logo" alt="Kinetick">
        </section>

        <section class="product-grid">
            <div class="product-card">
                <img src="TWC SEMI-AUTO ALGO.webp" class="product-image" alt="Semi-Auto">
                <div class="product-footer">
                    <div class="product-name">TWC SEMI-AUTO ALGO</div>
                    <div class="product-price">$199.00 USD</div>
                </div>
            </div>

            <div class="product-card">
                <img src="robot2.jpg" class="product-image" alt="Single Print">
                <div class="product-footer">
                    <div class="product-name">TWC SINGLE PRINT ALGO</div>
                    <div class="product-price">$799.00 USD</div>
                </div>
            </div>

            <div class="product-card">
                <img src="robot3.jpg" class="product-image" alt="Super Dom">
                <div class="product-footer">
                    <div class="product-name">TWC SUPER DOM</div>
                    <div class="product-price">$89.99 USD</div>
                </div>
            </div>
        </section>

    </div>

</body>
</html>
